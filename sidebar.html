<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Scraper Pro</title>
    <link rel="stylesheet" href="popup.css">
  
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo-bg">
                    <svg class="logo-icon" viewBox="0 0 24 24">
                        <path d="M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h2>Advanced Web Scraper</h2>
                    <p class="tagline">Extract page content</p>
                </div>
            </div>
        </div>
        
        <div class="scrape-section">
            <button id="scrapeAllBtn" class="btn-primary">
                <span class="btn-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 15.22 14.47 17 12 17s-4.52-1.78-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
                    </svg>
                </span>
                Scrape Entire Page
            </button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </div>

        <div class="content-stats">
            <div class="stat-item" data-type="heading">
                <div class="stat-content">
                    <span class="stat-icon">H</span>
                    <span class="stat-count" id="headingCount">0</span>
                    <span class="stat-label">Headings</span>
                </div>
            </div>
            <div class="stat-item" data-type="paragraph">
                <div class="stat-content">
                    <span class="stat-icon">P</span>
                    <span class="stat-count" id="paragraphCount">0</span>
                    <span class="stat-label">Paragraphs</span>
                </div>
            </div>
            <div class="stat-item" data-type="link">
                <div class="stat-content">
                    <span class="stat-icon">🔗</span>
                    <span class="stat-count" id="linkCount">0</span>
                    <span class="stat-label">Links</span>
                </div>
            </div>
            <div class="stat-item" data-type="image">
                <div class="stat-content">
                    <span class="stat-icon">🖼️</span>
                    <span class="stat-count" id="imageCount">0</span>
                    <span class="stat-label">Images</span>
                </div>
            </div>
            <div class="stat-item" data-type="text">
                <div class="stat-content">
                    <span class="stat-icon">✏️</span>
                    <span class="stat-count" id="textCount">0</span>
                    <span class="stat-label">Text</span>
                </div>
            </div>
            <div class="stat-item" data-type="list">
                <div class="stat-content">
                    <span class="stat-icon">📋</span>
                    <span class="stat-count" id="listCount">0</span>
                    <span class="stat-label">Lists</span>
                </div>
            </div>
            <div class="stat-item" data-type="table">
                <div class="stat-content">
                    <span class="stat-icon">📊</span>
                    <span class="stat-count" id="tableCount">0</span>
                    <span class="stat-label">Tables</span>
                </div>
            </div>
            <div class="stat-item" data-type="code">
                <div class="stat-content">
                    <span class="stat-icon"></></span>
                    <span class="stat-count" id="codeCount">0</span>
                    <span class="stat-label">Code</span>
                </div>
            </div>
        </div>

        <div class="content-filter">
            <h3>
                <span class="section-icon">🔍</span>
                Filter Content Types
            </h3>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="checkbox" id="filterHeading" checked data-type="Heading">
                    <span class="checkmark"></span>
                    Headings
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterParagraph" checked data-type="Paragraph">
                    <span class="checkmark"></span>
                    Paragraphs
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterLink" checked data-type="Link">
                    <span class="checkmark"></span>
                    Links
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterImage" checked data-type="Image">
                    <span class="checkmark"></span>
                    Images
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterText" checked data-type="Text">
                    <span class="checkmark"></span>
                    Text Blocks
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterList" checked data-type="List">
                    <span class="checkmark"></span>
                    Lists
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterTable" checked data-type="Table">
                    <span class="checkmark"></span>
                    Tables
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filterCode" checked data-type="Code">
                    <span class="checkmark"></span>
                    Code Blocks
                </label>
            </div>
        </div>

        <div class="content-section">
            <div class="section-header">
                <h3>
                    <span class="section-icon">📋</span>
                    Detected Content
                    <span class="content-summary" id="contentSummary"></span>
                </h3>
                <div class="content-actions">
                    <button id="selectAllBtn" class="btn-secondary" title="Select all visible items">
                        <span class="btn-icon">✓</span>
                        Select All
                    </button>
                    <button id="deselectAllBtn" class="btn-secondary" title="Clear all selections">
                        <span class="btn-icon">✕</span>
                        Clear All
                    </button>
                </div>
            </div>
            <div class="content-list" id="contentTypes">
                <div class="content-empty-state">
                    <p>No content detected yet. Click "Scrape Entire Page" to begin.</p>
                </div>
            </div>
        </div>

        <div class="download-section">
            <div class="download-options">
                <button id="downloadJsonBtn" class="btn-download">
                    <span class="btn-icon">{ }</span>
                    Download as JSON
                </button>
                <button id="downloadCsvBtn" class="btn-download">
                    <span class="btn-icon">📊</span>
                    Download as CSV
                </button>
                <button id="downloadHtmlBtn" class="btn-download">
                    <span class="btn-icon">📄</span>
                    Download as HTML
                </button>
                <button id="downloadImagesBtn" class="btn-download">
                    <span class="btn-icon">🖼️</span>
                    Download Images
                </button>
            </div>
        </div>

        <div class="status-message" id="statusMessage">
            <span class="status-icon">ℹ️</span>
            Ready to scrape
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
